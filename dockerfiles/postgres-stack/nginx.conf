server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.php index.html index.htm;

    server_name _;

    # Adminer location
    location /adminer {
        alias /var/www/html/adminer;
        index index.php;

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.1-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;

            # Hide Adminer's strict CSP header
            fastcgi_hide_header Content-Security-Policy;
            fastcgi_hide_header X-Powered-By;

            # Set a more permissive CSP for proxy compatibility
            add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data:; form-action *; frame-src https://www.adminer.org;" always;
        }
    }

    # Default location
    location / {
        try_files $uri $uri/ =404;
    }

    # PHP processing
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    }

    # Deny access to .htaccess files
    location ~ /\.ht {
        deny all;
    }
}
